<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firefighter — Atomix OPS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green: #A3F3C5;
  --navy: #0A1628;
  --navy3: #162640;
  --card: rgba(255,255,255,0.03);
  --border: rgba(163,243,197,0.12);
  --text: #e8f0f7;
  --muted: #6a8aaa;
  --red: #ff6b6b;
  --yellow: #ffd166;
  --blue: #74b9ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--navy);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% -10%, rgba(163,243,197,0.06) 0%, transparent 60%),
    linear-gradient(rgba(163,243,197,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(163,243,197,0.025) 1px, transparent 1px);
  background-size: 100% 100%, 48px 48px, 48px 48px;
  pointer-events: none; z-index: 0;
}

nav {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
}
.nav-home {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; letter-spacing: 0.1em;
  color: var(--muted); text-decoration: none;
  text-transform: uppercase; transition: color 0.2s;
}
.nav-home:hover { color: var(--green); }
.nav-status {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; color: var(--muted);
  display: flex; align-items: center; gap: 8px;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
.dot.live { background: var(--green); animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── IDLE ── */
#idle-screen {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: calc(100vh - 65px);
  padding: 40px 20px;
  gap: 0;
}

.title-block { text-align: center; margin-bottom: 72px; }
.title-block h1 {
  font-size: clamp(56px, 10vw, 100px);
  font-weight: 800; letter-spacing: -0.04em; line-height: 0.9;
}
.title-block h1 em { font-style: normal; color: var(--green); }
.title-block p {
  margin-top: 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px; color: var(--muted); letter-spacing: 0.06em;
}

.flame-wrap { display: flex; flex-direction: column; align-items: center; gap: 22px; }

.flame-btn {
  width: 128px; height: 128px; border-radius: 50%;
  border: 1.5px solid rgba(163,243,197,0.2);
  background: rgba(163,243,197,0.035);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 56px;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative; outline: none;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 0 0 0 rgba(163,243,197,0);
}
.flame-btn::before {
  content: ''; position: absolute; inset: -10px; border-radius: 50%;
  border: 1px solid rgba(163,243,197,0.07); transition: all 0.3s;
}
.flame-btn::after {
  content: ''; position: absolute; inset: -22px; border-radius: 50%;
  border: 1px solid rgba(163,243,197,0.03); transition: all 0.3s;
}
.flame-btn:hover {
  transform: scale(1.09);
  border-color: rgba(163,243,197,0.55);
  background: rgba(163,243,197,0.08);
  box-shadow: 0 0 50px rgba(163,243,197,0.18), 0 0 100px rgba(163,243,197,0.07);
}
.flame-btn:hover::before { inset: -16px; border-color: rgba(163,243,197,0.14); }
.flame-btn:hover::after  { inset: -30px; border-color: rgba(163,243,197,0.05); }
.flame-btn:active { transform: scale(0.96); }
.flame-btn.loading {
  animation: flame-pulse 1.1s ease-in-out infinite;
  pointer-events: none;
  border-color: rgba(163,243,197,0.45);
}
@keyframes flame-pulse {
  0%,100% { transform: scale(1); box-shadow: 0 0 30px rgba(163,243,197,0.08); }
  50%      { transform: scale(1.06); box-shadow: 0 0 70px rgba(163,243,197,0.22); }
}

.flame-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; text-align: center; }
.flame-label strong { display: block; color: var(--text); font-size: 13px; margin-bottom: 5px; letter-spacing: 0.04em; text-transform: none; }

/* PROGRESS */
#progress-wrap { display: none; margin-top: 44px; width: min(400px, 88vw); text-align: center; }
#progress-wrap.show { display: block; }
.progress-step { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); margin-bottom: 16px; min-height: 18px; }
.progress-bar-track { height: 2px; background: rgba(163,243,197,0.08); border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; width: 0%; background: var(--green); border-radius: 2px; transition: width 0.5s ease; box-shadow: 0 0 8px rgba(163,243,197,0.5); }

.error-box { display: none; background: rgba(255,107,107,0.06); border: 1px solid rgba(255,107,107,0.2); border-radius: 10px; padding: 14px 20px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--red); margin-top: 24px; text-align: center; max-width: 400px; }
#error-box.show { display: block; }

/* ── RESULTS ── */
#results-screen { display: none; position: relative; z-index: 1; padding: 32px; max-width: 1280px; margin: 0 auto; }
#results-screen.show { display: block; }

.results-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 14px; }
.results-title { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
.results-title span { color: var(--green); }
.results-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 5px; }
.btn-repull { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; background: rgba(163,243,197,0.05); border: 1px solid var(--border); color: var(--green); padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.btn-repull:hover { background: rgba(163,243,197,0.1); border-color: rgba(163,243,197,0.3); }

.summary-banner { background: rgba(163,243,197,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 36px; font-size: 14px; line-height: 1.65; color: var(--text); }
.summary-banner strong { color: var(--green); }

.area-section { margin-bottom: 44px; }
.area-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.area-icon { font-size: 17px; }
.area-name { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); }
.area-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: rgba(163,243,197,0.07); color: var(--green); border: 1px solid rgba(163,243,197,0.15); border-radius: 4px; padding: 2px 8px; }

.tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

.tile { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden; animation: tile-in 0.35s ease both; }
@keyframes tile-in { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.tile::before { content: ''; position: absolute; top:0; left:0; right:0; height:3px; }
.tile[data-prio="🔴"]::before { background: var(--red); }
.tile[data-prio="🟡"]::before { background: var(--yellow); }
.tile[data-prio="🟢"]::before { background: var(--green); }
.tile[data-prio="ℹ️"]::before { background: var(--blue); }
.tile:hover { border-color: rgba(163,243,197,0.28); background: rgba(255,255,255,0.05); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.22); }

.tile-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
.tile-source { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }
.prio-pill { font-family: 'IBM Plex Mono', monospace; font-size: 10px; border-radius: 4px; padding: 2px 8px; font-weight: 500; }
.prio-pill.red    { background:rgba(255,107,107,0.12); color:var(--red);    border:1px solid rgba(255,107,107,0.25); }
.prio-pill.yellow { background:rgba(255,209,102,0.1);  color:var(--yellow); border:1px solid rgba(255,209,102,0.22); }
.prio-pill.green  { background:rgba(163,243,197,0.08); color:var(--green);  border:1px solid rgba(163,243,197,0.2); }
.prio-pill.blue   { background:rgba(116,185,255,0.08); color:var(--blue);   border:1px solid rgba(116,185,255,0.2); }

.tile-title { font-size: 14px; font-weight: 700; line-height: 1.35; margin-bottom: 8px; }
.tile-body  { font-size: 13px; color: var(--muted); line-height: 1.55; }
.tile-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.04); gap: 8px; flex-wrap: wrap; }
.tile-time { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); opacity: 0.6; }
.tile-tag  { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 4px; padding: 2px 7px; }

.tile-expanded { display: none; }
.tile.open .tile-expanded { display: block; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); animation: fade-in 0.2s ease; }
@keyframes fade-in { from{opacity:0} to{opacity:1} }
.actions-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--green); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; margin-top: 2px; }
.action-list { list-style: none; }
.action-list li { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; color: var(--muted); align-items: flex-start; }
.action-list li:last-child { border: none; }
.action-list li::before { content: '→'; color: var(--green); font-family: monospace; flex-shrink: 0; }
.ext-link { display: inline-flex; align-items: center; gap: 4px; color: var(--green); text-decoration: none; font-family: 'IBM Plex Mono', monospace; font-size: 11px; margin-top: 10px; opacity: 0.75; transition: opacity 0.15s; }
.ext-link:hover { opacity: 1; }

.no-issues { text-align: center; padding: 40px 20px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); opacity: 0.5; }

@media (max-width: 600px) {
  nav { padding: 16px 20px; }
  #results-screen { padding: 20px 16px; }
  .tile-grid { grid-template-columns: 1fr; }
  .results-title { font-size: 22px; }
}
</style>
</head>
<body>

<nav>
  <a class="nav-home" href="https://drake-arch.github.io/atomix-ops/">← Atomix OPS</a>
  <div class="nav-status">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">idle</span>
  </div>
</nav>

<!-- IDLE -->
<div id="idle-screen">
  <div class="title-block">
    <h1>Fire<em>fighter</em></h1>
    <p>Slack · Gmail · ClickUp — pulled by Claude, sorted by area</p>
  </div>

  <div class="flame-wrap">
    <button class="flame-btn" id="flame-btn" onclick="startPull()" title="Pull current issues">🔥</button>
    <div class="flame-label">
      <strong>Tap to pull</strong>
      Slack · Email · ClickUp → Right Now
    </div>
  </div>

  <div id="progress-wrap">
    <div class="progress-step" id="progress-step">Initializing...</div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
  </div>

  <div class="error-box" id="error-box"></div>
</div>

<!-- RESULTS -->
<div id="results-screen">
  <div class="results-header">
    <div>
      <div class="results-title">Fire<span>fighter</span></div>
      <div class="results-meta" id="results-meta"></div>
    </div>
    <button class="btn-repull" onclick="resetToIdle()">🔥 Re-pull</button>
  </div>
  <div class="summary-banner" id="summary-banner"></div>
  <div id="areas-container"></div>
</div>

<script>
const AREAS = [
  { key:'operations', label:'Operations', icon:'📦' },
  { key:'cx',         label:'Customer',   icon:'🤝' },
  { key:'tech',       label:'Tech',       icon:'⚙️' },
  { key:'hr',         label:'HR',         icon:'👥' },
  { key:'finance',    label:'Finance',    icon:'💰' },
  { key:'other',      label:'Other',      icon:'📌' },
];

const STEPS = [
  { msg:'Connecting to Slack...',               pct:12 },
  { msg:'Reading #operations-management...',    pct:25 },
  { msg:'Scanning your Slack mentions...',      pct:38 },
  { msg:'Pulling Gmail...',                     pct:52 },
  { msg:'Fetching open ClickUp tasks...',       pct:65 },
  { msg:'Sending to Claude for analysis...',    pct:80 },
  { msg:'Organizing by area...',                pct:92 },
  { msg:'Almost there...',                      pct:97 },
];

let stepTimer = null;

function animateSteps(steps) {
  let i = 0;
  const prog  = document.getElementById('progress-wrap');
  const label = document.getElementById('progress-step');
  const fill  = document.getElementById('progress-fill');
  prog.classList.add('show');
  function next() {
    if (i >= steps.length) return;
    const s = steps[i++];
    label.textContent = s.msg;
    fill.style.width  = s.pct + '%';
    stepTimer = setTimeout(next, 550 + Math.random() * 350);
  }
  next();
}

async function startPull() {
  const btn    = document.getElementById('flame-btn');
  const dot    = document.getElementById('status-dot');
  const stxt   = document.getElementById('status-text');
  const errBox = document.getElementById('error-box');

  btn.classList.add('loading');
  errBox.classList.remove('show');
  dot.classList.add('live');
  stxt.textContent = 'pulling...';

  animateSteps(STEPS);

  try {
    const data = await fetchWithClaude();
    showResults(data);
  } catch(err) {
    errBox.textContent = '⚠ ' + (err.message || 'Pull failed.');
    errBox.classList.add('show');
    btn.classList.remove('loading');
    dot.classList.remove('live');
    stxt.textContent = 'error';
    clearTimeout(stepTimer);
    document.getElementById('progress-step').textContent = 'Failed. Tap to retry.';
  }
}

async function fetchWithClaude() {
  const today = new Date().toLocaleDateString('en-US',{ weekday:'long', month:'long', day:'numeric', year:'numeric' });
  const now   = new Date().toLocaleTimeString('en-US',{ hour:'2-digit', minute:'2-digit' });

  const systemPrompt = `You are Firefighter AI for Atomix Logistics (ATX), a 3PL warehouse with facilities in Milwaukee/Oak Creek (MKE), Salt Lake City (SLC), and Baltimore (BAL).

Drake = Operations Lead. Team: Kody Malas (AM Outbound), Hugh Myers (PM Outbound), Adam Gronowski (Special Projects), Emyly Herrera-Vera (Inbound), Luis Gumucio (Inventory).
Active clients: Omni, Peruse, Brow Code, IQ (cold chain ~6k orders/wk), Goose Swag. Offboarding: Lights Lacquer.
Standing concerns: FIFO/lot traceability (iQ), cycle count cadence, SLA on received inventory, Wisconsin DATCP inspection prep.

Pull Slack (Drake's user ID U08C7AF906L, channels: #operations-management C08BGRBT2TX, #reported-errors C0AHZCMSHBQ), Gmail (unread/flagged last 48h), and ClickUp (open/overdue tasks).

RESPOND ONLY WITH VALID JSON — no markdown fences, no explanation:
{
  "pulled_at": "ISO timestamp",
  "summary": "2-3 sentence plain-English ops snapshot. Direct. Specific. Name what is actually on fire.",
  "areas": {
    "operations": [ { "title":"...", "body":"2-3 sentences, factual", "priority":"🔴|🟡|🟢|ℹ️", "source":"slack|gmail|clickup|combined", "time":"e.g. 2h ago", "actions":["action 1"], "link":"url or null", "tag":"e.g. MKE or IQ" } ],
    "cx": [], "tech": [], "hr": [], "finance": [], "other": []
  }
}
Priority: 🔴 blocking, 🟡 needs attention today, 🟢 FYI, ℹ️ info. Sort each area high→low, newest first.
Today: ${today}, ${now}.`;

  const userPrompt = `Pull the current state of Atomix Logistics ops right now. Check:
1. Slack: My mentions (<@U08C7AF906L>) last 48h. Scan #operations-management (C08BGRBT2TX) and #reported-errors (C0AHZCMSHBQ) for active issues and unresolved threads.
2. Gmail: Unread or flagged threads from last 48h related to ops, clients, or escalations.
3. ClickUp: All open/in-progress tasks in the Operations space. Flag anything overdue or due today.

Synthesize everything into the JSON report. Prioritize anything blocking, overdue, or client-facing. Sort newest/highest priority first within each area.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      system: systemPrompt,
      mcp_servers: [
        { type:'url', url:'https://mcp.slack.com/mcp',             name:'slack'   },
        { type:'url', url:'https://gmailmcp.googleapis.com/mcp/v1', name:'gmail'   },
        { type:'url', url:'https://mcp.clickup.com/mcp',            name:'clickup' },
      ],
      messages: [{ role:'user', content: userPrompt }],
    })
  });

  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e?.error?.message || `API ${res.status}`);
  }

  const raw = await res.json();
  const text = raw.content.filter(b=>b.type==='text').map(b=>b.text).join('');
  const clean = text.replace(/^```(?:json)?\s*/i,'').replace(/\s*```\s*$/i,'').trim();

  try { return JSON.parse(clean); }
  catch { throw new Error('Claude returned invalid JSON. Try again.'); }
}

function showResults(data) {
  clearTimeout(stepTimer);
  document.getElementById('idle-screen').style.display = 'none';
  const rs = document.getElementById('results-screen');
  rs.classList.add('show');
  document.getElementById('status-dot').classList.add('live');
  document.getElementById('status-text').textContent = 'live';

  const pulledAt = data.pulled_at
    ? new Date(data.pulled_at).toLocaleString('en-US',{hour:'2-digit',minute:'2-digit',month:'short',day:'numeric'})
    : new Date().toLocaleString('en-US',{hour:'2-digit',minute:'2-digit',month:'short',day:'numeric'});
  document.getElementById('results-meta').textContent = `Pulled ${pulledAt} · Slack · Gmail · ClickUp`;

  document.getElementById('summary-banner').innerHTML = data.summary
    ? data.summary.replace(/\b(urgent|blocking|overdue|ASAP|critical)\b/gi,'<strong>$1</strong>')
    : '<em style="color:var(--muted)">No summary.</em>';

  const container = document.getElementById('areas-container');
  container.innerHTML = '';

  let totalIssues = 0;
  AREAS.forEach((area, ai) => {
    const items = (data.areas||{})[area.key] || [];
    if (!items.length) return;
    totalIssues += items.length;

    const section = document.createElement('div');
    section.className = 'area-section';
    section.innerHTML = `
      <div class="area-header">
        <span class="area-icon">${area.icon}</span>
        <span class="area-name">${area.label}</span>
        <span class="area-count">${items.length}</span>
      </div>
      <div class="tile-grid" id="grid-${area.key}"></div>`;
    container.appendChild(section);

    const grid = section.querySelector(`#grid-${area.key}`);
    items.forEach((item, idx) => {
      const t = buildTile(item, idx + ai * 5);
      grid.appendChild(t);
    });
  });

  if (!totalIssues) {
    container.innerHTML = '<div class="no-issues">✓ No active issues found across Slack, Gmail, and ClickUp.</div>';
  }
}

function buildTile(item, delay) {
  const prioMap = {
    '🔴':{ cls:'red',    label:'HIGH' },
    '🟡':{ cls:'yellow', label:'MED'  },
    '🟢':{ cls:'green',  label:'LOW'  },
    'ℹ️':{ cls:'blue',   label:'INFO' },
  };
  const prio = prioMap[item.priority] || { cls:'blue', label:'INFO' };
  const srcLabel = { slack:'◈ Slack', gmail:'✉ Gmail', clickup:'✦ ClickUp', combined:'⊕ Multi' }[item.source] || '◈ ' + (item.source||'Source');

  const t = document.createElement('div');
  t.className = 'tile';
  t.dataset.prio = item.priority || 'ℹ️';
  t.style.animationDelay = (delay * 55) + 'ms';

  const actHTML = (item.actions||[]).length
    ? `<div class="actions-label">Action Items</div><ul class="action-list">${item.actions.map(a=>`<li>${esc(a)}</li>`).join('')}</ul>`
    : '';
  const linkHTML = item.link
    ? `<a class="ext-link" href="${esc(item.link)}" target="_blank" rel="noopener">↗ Open in source</a>`
    : '';

  t.innerHTML = `
    <div class="tile-top">
      <span class="tile-source">${srcLabel}</span>
      <span class="prio-pill ${prio.cls}">${prio.label}</span>
    </div>
    <div class="tile-title">${esc(item.title||'Untitled')}</div>
    <div class="tile-body">${esc(item.body||'')}</div>
    <div class="tile-footer">
      <span class="tile-time">${esc(item.time||'')}</span>
      ${item.tag?`<span class="tile-tag">${esc(item.tag)}</span>`:''}
    </div>
    <div class="tile-expanded">${actHTML}${linkHTML}</div>`;

  t.addEventListener('click', () => t.classList.toggle('open'));
  return t;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function resetToIdle() {
  document.getElementById('idle-screen').style.display = '';
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('areas-container').innerHTML = '';
  document.getElementById('progress-wrap').classList.remove('show');
  document.getElementById('progress-fill').style.width = '0%';
